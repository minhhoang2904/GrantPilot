services:
  mongodb:
    image: mongo:7
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Chạy một lần để OCR/parse -> MongoDB -> Pinecone.
  server-a-ingestion:
    build: ./server-a-ingestion
    env_file:
      - ./server-a-ingestion/.env
    volumes:
      - ./shared:/app/shared
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=${MONGO_DB:-grantpilot}
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"

  server-a-api:
    build: ./server-a-ingestion
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - ./server-a-ingestion/.env
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=${MONGO_DB:-grantpilot}
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy

  server-b-retrieval:
    build: ./server-b-retrieval
    env_file:
      - ./server-a-ingestion/.env
    ports:
      - "8001:8001"
    volumes:
      - ./shared:/app/shared
    depends_on:
      server-a-ingestion:
        condition: service_completed_successfully
      server-a-api:
        condition: service_started
    environment:
      - POLICY_DB_PATH=/app/shared/policy.db
      - PINECONE_NAMESPACE=${PINECONE_NAMESPACE:-legal_units}
      - SERVER_A_URL=http://server-a-api:8000
      - FPT_BASE_URL=${FPT_BASE_URL:-https://mkp-api.fptcloud.com}
      - FPT_EMBEDDING_MODEL=${FPT_EMBEDDING_MODEL:-Vietnamese_Embedding}

  server-c-eligibility:
    build: ./server-c-eligibility
    ports:
      - "8002:8002"
    volumes:
      - ./shared:/app/shared
    depends_on:
      server-a-ingestion:
        condition: service_completed_successfully
    environment:
      - POLICY_DB_PATH=/app/shared/policy.db

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    depends_on:
      - server-b-retrieval
      - server-c-eligibility
    environment:
      - SERVER_B_URL=http://server-b-retrieval:8001
      - SERVER_C_URL=http://server-c-eligibility:8002

volumes:
  mongodb_data:
